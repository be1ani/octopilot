server {
  listen 8080;
  server_name _;

  # Profile attachment uploads are arbitrarily large; the orchestrator backend
  # decides what to accept. Setting `0` disables nginx's request-body size cap.
  client_max_body_size 0;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Frontend calls the backend at /api/* (same origin).
  location /api/ {
    # Preserve the /api prefix (so /api/health -> /api/health).
    proxy_pass http://orchestrator-backend:5050;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Stream large bodies (uploads / downloads) straight through without
    # buffering them to disk in nginx first.
    client_max_body_size 0;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
  }
}

